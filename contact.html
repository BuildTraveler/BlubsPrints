<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt — Blub's Prints</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&family=Archivo:wght@500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <a href="index.html" class="brand">Blub's Prints</a>
    <nav class="nav-desktop">
      <a href="index.html" class="nav-link">Home</a>
      <a href="contact.html" class="nav-link active">Kontakt</a>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="Open Menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu">
    <button class="mobile-close" id="mobileClose">Sluit menu</button>
    <nav class="mobile-nav">
      <a href="index.html" class="mobile-nav-link">Home</a>
      <a href="contact.html" class="mobile-nav-link">Kontakt</a>
    </nav>
  </div>
  <div class="mobile-overlay" id="mobileOverlay"></div>

  <main>
    <section class="contact-page-section">
      <div class="contact-page-inner">
        <h1 class="contact-page-title">Neem kontakt op!</h1>
        <p class="contact-page-sub">Print idee? laat het ons weten!</p>

        <div class="contact-info-block">
          <p class="contact-info-label">Email ons via</p>
          <a href="mailto:blub.kaarten@gmail.com" class="contact-page-email">blub.kaarten@gmail.com</a>
          <p class="contact-note">Alleen kleine orders (50 stuks of minder)</p>
        </div>

        <!-- <div class="contact-form-block"> 
          <h2 class="contact-form-heading">Send a message</h2>
          <form class="contact-form" onsubmit="handleSubmit(event)">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your name" required />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="your@email.com" required />
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="5" placeholder="Tell us about your project..." required></textarea>
            </div>
            <button type="submit" class="form-submit">Send Message</button>
          </form>
          <p class="form-note" id="formNote"></p>
        </div>-->
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-brand">Blub's Prints</p>
      <p class="footer-tagline">Gemaakt met liefde en enthousiasme</p>
      <a href="mailto:blub.kaarten@gmail.com" class="footer-email">blub.kaarten@gmail.com</a>
      <p class="footer-location">Amsterdam, NL</p>
    </div>
  </footer>

  <script src="main.js"></script>
  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const note = document.getElementById('formNote');
      note.textContent = "Thanks for your message! We'll get back to you soon.";
      note.style.color = '#000';
      e.target.reset();
    }
  </script>
</body>
</html>
